<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Perfumería - Catálogo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#f0e8d0}
header{background:#0d0d0d;border-bottom:1px solid #2a2000;padding:16px 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo-wrap img{height:90px;width:auto;display:block}
.wa-btn{display:flex;align-items:center;gap:10px;background:#1a7a3a;color:#fff;text-decoration:none;border-radius:24px;padding:10px 20px;font-size:14px;font-weight:600;transition:background 0.2s}
.wa-btn:hover{background:#25a050}
.wa-icon{width:22px;height:22px;fill:#fff;flex-shrink:0}
.wa-label{display:flex;flex-direction:column;line-height:1.25}
.wa-label span:first-child{font-size:11px;opacity:0.8;font-weight:400}
.controls{background:#111;border-bottom:1px solid #2a2000;padding:12px 24px;position:sticky;top:0;z-index:100}
.controls-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;background:#1c1c1c;border:1px solid #3a2e00;color:#f0e8d0;border-radius:8px;padding:9px 14px 9px 38px;font-size:14px;outline:none;transition:border 0.2s}
.search-wrap input:focus{border-color:#c8960a}
.search-wrap input::placeholder{color:#555}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:#1c1c1c;border:1px solid #3a2e00;color:#c8960a;border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500}
.filter-btn:hover,.filter-btn.active{background:#c8960a;color:#000;border-color:#c8960a}
.stats{color:#555;font-size:13px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;padding:20px 24px;max-width:1400px;margin:0 auto}
.card{background:#1a1200;border:1px solid #2a2000;border-radius:10px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
.card:hover{transform:translateY(-3px);border-color:#c8960a}
.card img{width:100%;aspect-ratio:1;object-fit:cover;background:#111;display:block}
.card-body{padding:10px 12px 12px}
.card-code{font-size:10px;color:#7a5a00;font-weight:700;letter-spacing:0.08em;margin-bottom:3px}
.card-name{font-size:12px;color:#d4c090;line-height:1.4;margin-bottom:7px;min-height:32px}
.card-price{font-size:15px;font-weight:700;color:#c8960a}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:#444;font-size:16px}
footer{text-align:center;padding:24px;color:#3a2e00;font-size:12px;border-top:1px solid #1a1200;margin-top:12px}
.agotada-badge{display:inline-block;background:#7a0000;color:#ffb3b3;font-size:9px;font-weight:800;letter-spacing:0.1em;border-radius:4px;padding:2px 6px;margin-left:6px;text-transform:uppercase;vertical-align:middle}
.card-price.agotada-price{opacity:0.5;text-decoration:line-through}
.panel-agotadas{background:#111;border-top:2px solid #3a2e00;padding:24px;margin-top:0}
.panel-agotadas-inner{max-width:1400px;margin:0 auto}
.panel-agotadas h2{color:#c8960a;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.panel-agotadas-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.panel-agotadas input[type=text]{background:#1c1c1c;border:1px solid #3a2e00;color:#f0e8d0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;width:160px;transition:border 0.2s}
.panel-agotadas input[type=text]:focus{border-color:#c8960a}
.panel-agotadas button{background:#7a0000;color:#ffb3b3;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s}
.panel-agotadas button:hover{background:#a00000}
.btn-quitar{background:#1c1c1c !important;color:#c8960a !important;border:1px solid #3a2e00 !important}
.btn-quitar:hover{background:#2a2000 !important}
.agotadas-list{display:flex;gap:8px;flex-wrap:wrap}
.agotada-tag{display:flex;align-items:center;gap:6px;background:#1c1c1c;border:1px solid #7a0000;border-radius:8px;padding:5px 10px;font-size:12px;color:#ffb3b3}
.agotada-tag button{background:none;border:none;color:#ffb3b3;cursor:pointer;font-size:14px;padding:0;line-height:1}
.agotada-tag button:hover{color:#fff}
.btn-descargar{background:#1a4a00 !important;color:#a0e080 !important;border:1px solid #2a6a00 !important}
.btn-descargar:hover{background:#2a6a00 !important}
@media(max-width:600px){
  .header-inner{justify-content:center}
  .header-right{align-items:center}
  .logo-wrap img{height:70px}
}
</style>
</head>

let currentCat = 'all';
let agotadas = new Set(['024','025']);

function fmt(p) {
  return '$' + p.toLocaleString('es-CO');
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = PRODUCTS.filter(p => {
    const matchCat = currentCat === 'all' || p.cat === currentCat;
    const matchSearch = !q || p.name.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
  render(filtered);
}

function render(list) {
  const grid = document.getElementById('grid');
  document.getElementById('stats').textContent = list.length + ' producto' + (list.length !== 1 ? 's' : '');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">No se encontraron productos</div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const isAgotada = agotadas.has(p.code);
    return `
    <div class="card">
      ${p.rot
        ? `<div style="width:100%;aspect-ratio:1;overflow:hidden;position:relative;">
            <img src="${p.img}" alt="${p.name}" loading="lazy" style="display:block;width:100%;height:100%;object-fit:cover;transform:rotate(${p.rot==='R'?'90deg':'-90deg'});">
           </div>`
        : `<img src="${p.img}" alt="${p.name}" loading="lazy">`}
      <div class="card-body">
        <div class="card-code">#${p.code}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price${isAgotada ? ' agotada-price' : ''}">${fmt(p.price)}${isAgotada ? '<span class="agotada-badge">Agotada</span>' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function renderAgotadasPanel() {
  const list = document.getElementById('agotadasList');
  if (agotadas.size === 0) {
    list.innerHTML = '<span style="color:#555;font-size:12px">Ningún producto marcado como agotado.</span>';
    return;
  }
  list.innerHTML = [...agotadas].sort().map(code => `
    <div class="agotada-tag">
      <span>#${code}</span>
      <button onclick="quitarAgotada('${code}')" title="Quitar">✕</button>
    </div>`).join('');
}

function agregarAgotada() {
  const input = document.getElementById('inputCodigo');
  const code = input.value.trim().replace(/^#/, '').padStart(3, '0');
  if (!code) return;
  const existe = PRODUCTS.find(p => p.code === code);
  if (!existe) { alert('Código #' + code + ' no encontrado en el catálogo.'); return; }
  agotadas.add(code);
  input.value = '';
  renderAgotadasPanel();
  applyFilters();
}

function quitarAgotada(code) {
  agotadas.delete(code);
  renderAgotadasPanel();
  applyFilters();
}

function quitarTodas() {
  agotadas.clear();
  renderAgotadasPanel();
  applyFilters();
}

function descargarHTML() {
  // Get current page source and inject updated agotadas set
  const html = document.documentElement.outerHTML;
  // Replace the agotadas Set initialization with current state
  const codesArr = [...agotadas].map(c => "'" + c + "'").join(',');
  const updated = html.replace(
    /let agotadas = new Set\(\[.*?\]\);/,
    "let agotadas = new Set([" + codesArr + "]);"
  );
  const blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dubai_perfumeria.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

renderAgotadasPanel();
applyFilters();
</script>
